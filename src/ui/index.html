<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevLens — Browser para Desenvolvimento com IA</title>
  <meta name="description" content="Browser desktop que identifica arquivos-fonte de componentes web para uso com IA." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Title Bar (drag region) ───────────────────────────────────────── -->
  <div id="titlebar">
    <div id="titlebar-drag">
      <span id="app-logo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#7C3AED" stroke-width="2" stroke-linejoin="round"/>
          <path d="M2 17L12 22L22 17" stroke="#06B6D4" stroke-width="2" stroke-linejoin="round"/>
          <path d="M2 12L12 17L22 12" stroke="#7C3AED" stroke-width="2" stroke-opacity="0.5" stroke-linejoin="round"/>
        </svg>
        DevLens
      </span>
    </div>
    <div id="window-controls">
      <button id="btn-minimize" class="wc-btn" title="Minimizar">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="5.5" width="10" height="1" fill="currentColor"/></svg>
      </button>
      <button id="btn-maximize" class="wc-btn" title="Maximizar">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1.5" y="1.5" width="9" height="9" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
      </button>
      <button id="btn-close" class="wc-btn close" title="Fechar">
        <svg width="12" height="12" viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.4"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.4"/></svg>
      </button>
    </div>
  </div>

  <!-- ── Tabs Bar ───────────────────────────────────────────────────────── -->
  <div id="tabs-bar">
    <div id="tabs-list"></div>
    <button id="btn-add-tab" title="Nova Aba">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <!-- ── Toolbar ────────────────────────────────────────────────────────── -->
  <div id="toolbar">
    <!-- Navigation -->
    <div id="nav-buttons">
      <button id="btn-back" class="nav-btn" title="Voltar" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button id="btn-forward" class="nav-btn" title="Avançar" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button id="btn-reload" class="nav-btn" title="Recarregar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <button id="btn-clear-cache" class="nav-btn" title="Limpar Dados e Cache Total">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
      </button>
    </div>

    <!-- URL Bar -->
    <div id="url-bar-wrapper">
      <span id="url-lock-icon">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </span>
      <input
        type="text"
        id="url-input"
        placeholder="http://localhost:3000"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="btn-go" title="Ir">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>

    <!-- Inspect Toggle -->
    <button id="btn-inspect" title="Ativar Modo Inspeção (Ctrl+I)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
      <span id="inspect-label">Inspecionar</span>
      <span id="inspect-indicator"></span>
    </button>

    <!-- Mobile Mode -->
    <button id="btn-mobile" title="Modo Mobile">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
        <line x1="12" y1="18" x2="12.01" y2="18"/>
      </svg>
      <span>Mobile</span>
    </button>

    <!-- Device Selector (Hidden by default) -->
    <div id="device-selector-wrapper" class="hidden">
      <select id="device-selector">
        <option value="responsive">Responsive</option>
        <optgroup label="iOS">
          <option value="iphone-se">iPhone SE (375x667)</option>
          <option value="iphone-xr">iPhone XR (414x896)</option>
          <option value="iphone-12-pro">iPhone 12 Pro (390x844)</option>
          <option value="iphone-14-pro-max">iPhone 14 Pro Max (430x932)</option>
          <option value="ipad-mini">iPad Mini (768x1024)</option>
          <option value="ipad-air">iPad Air (820x1180)</option>
          <option value="ipad-pro">iPad Pro (1024x1366)</option>
        </optgroup>
        <optgroup label="Android">
          <option value="pixel-7">Pixel 7 (412x915)</option>
          <option value="samsung-s8">Samsung Galaxy S8+ (360x740)</option>
          <option value="samsung-s20">Samsung Galaxy S20 Ultra (412x915)</option>
        </optgroup>
      </select>
    </div>

    <!-- Developer Mode -->
    <button id="btn-devtools" title="Modo Desenvolvedor (F12)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="16 18 22 12 16 6"/>
        <polyline points="8 6 2 12 8 18"/>
      </svg>
      <span>DevTools</span>
    </button>

    <!-- Project Folder -->
    <button id="btn-project" title="Vincular pasta do projeto local para autodetecção de arquivos em React 19">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
      </svg>
      <span id="project-label">Vincular Pasta</span>
    </button>
  </div>

  <!-- ── Webview ─────────────────────────────────────────────────────────── -->
  <div id="webview-container">
    <!-- Tela inicial (antes de carregar uma URL) -->
    <div id="start-screen">
      <div id="start-logo">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#7C3AED" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M2 17L12 22L22 17" stroke="#06B6D4" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M2 12L12 17L22 12" stroke="#7C3AED" stroke-width="1.5" stroke-opacity="0.5" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>DevLens</h1>
      <p>Digite a URL do seu projeto na barra acima<br />e pressione <kbd>Enter</kbd> para começar.</p>
      <div id="start-tips">
        <div class="tip">
          <span class="tip-key">Ctrl+I</span>
          <span>Ativa o Modo Inspeção</span>
        </div>
        <div class="tip">
          <span class="tip-key">Click</span>
          <span>Copia o caminho do arquivo</span>
        </div>
        <div class="tip">
          <span class="tip-key">Hover</span>
          <span>Revela o componente-fonte</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Info Bar (aparece quando elemento é inspecionado) ──────────────── -->
  <div id="info-bar" class="hidden">
    <div id="info-left">
      <span id="info-framework-badge" class="framework-badge">—</span>
      <div id="info-details">
        <span id="info-component">—</span>
        <span id="info-separator" class="hidden">·</span>
        <span id="info-filepath" class="mono">Passe o mouse sobre um elemento</span>
        <span id="info-line" class="mono hidden"></span>
        <button id="btn-quick-project" class="quick-project-btn hidden" title="Vincular pasta do projeto para achar o arquivo deste componente">Vincular Pasta</button>
      </div>
    </div>
    <div id="info-right">
      <button id="btn-copy-path" class="copy-btn" disabled title="Copiar caminho do arquivo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span id="copy-btn-label">Copiar Caminho</span>
      </button>
    </div>
  </div>

  <!-- ── Toast de feedback ──────────────────────────────────────────────── -->
  <div id="toast" class="hidden">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="toast-message">Caminho copiado!</span>
  </div>

  <!-- ── Modal de Intenção ──────────────────────────────────────────────── -->
  <div id="intent-modal" class="hidden">
    <div id="intent-modal-backdrop"></div>
    <div id="intent-modal-content">
      <h2>O que deseja alterar?</h2>
      <p id="intent-modal-element-info"></p>
      <input type="text" id="intent-input" placeholder="Ex: Quero que retire essa coluna do footer" autocomplete="off" />
      <div id="intent-modal-actions">
        <button id="btn-intent-cancel" class="btn-cancel">Cancelar</button>
        <button id="btn-intent-confirm" class="btn-primary">Copiar Prompt</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
